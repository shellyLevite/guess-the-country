services:
  - type: web
    name: guess-the-country-api
    runtime: node
    rootDir: server
    buildCommand: npm install && npm run build
    startCommand: node dist/index.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 3000
      - key: ALLOWED_ORIGIN
        sync: false   # Set this to your Vercel frontend URL after deploying
