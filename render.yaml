services:
  - type: web
    name: guess-the-country-api
    runtime: node
    rootDir: server
    buildCommand: npm install --include=dev && npx prisma generate && npx prisma migrate deploy && npm run build && node dist/seed.js
    startCommand: node dist/index.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: ALLOWED_ORIGIN
        sync: false   # Set this to your Vercel frontend URL after deploying
      - key: DATABASE_URL
        sync: false   # Set this to your Render Postgres internal connection string
